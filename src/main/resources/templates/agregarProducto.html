<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .header-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 20px 20px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .form-label {
            font-weight: 600;
            color: #495057;
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-cancel {
            padding: 12px 30px;
            border-radius: 25px;
            border: 2px solid #6c757d;
            transition: all 0.3s ease;
        }
        .btn-cancel:hover {
            background-color: #6c757d;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header-section">
        <div class="container">
            <h1 class="mb-0"><i class="bi bi-plus-circle-fill me-2"></i>Agregar Nuevo Producto</h1>
            <p class="mb-0 mt-2">Complete el formulario para registrar un nuevo producto</p>
        </div>
    </div>

    <div class="container">
        <div class="card p-4">
            <div class="card-body">
                <form action="/producto/agregar" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="referencia" class="form-label">
                                <i class="bi bi-tag-fill me-2"></i>Referencia
                            </label>
                            <input type="text" class="form-control" id="referencia" name="referencia" required placeholder="Ingrese la referencia">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="categoria" class="form-label">
                                <i class="bi bi-list-ul me-2"></i>Categoría
                            </label>
                            <div class="input-group">
                                <select class="form-control" id="categoria" name="categoria" required>
                                    <option value="">Seleccione una categoría</option>
                                    <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}"></option>
                                </select>
                                <a href="/categoria/agregar" class="btn btn-outline-warning" title="Agregar nueva categoría">
                                    <i class="bi bi-plus-circle-fill"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="precio" class="form-label">
                                <i class="bi bi-currency-dollar me-2"></i>Precio
                            </label>
                            <input type="number" class="form-control" id="precio" name="precio" required placeholder="Ingrese el precio">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="stock" class="form-label">
                                <i class="bi bi-box-seam me-2"></i>Stock
                            </label>
                            <input type="number" class="form-control" id="stock" name="stock" required placeholder="Ingrese el stock">
                        </div>
                    </div>
                    <div class="d-flex gap-3 mt-4">
                        <a href="/" class="btn btn-outline-dark">
                            <i class="bi bi-house-fill me-2"></i>Volver al Home
                        </a>
                        <button type="submit" class="btn btn-primary btn-submit">
                            <i class="bi bi-check-circle-fill me-2"></i>Agregar Producto
                        </button>
                        <a href="/producto" class="btn btn-outline-secondary btn-cancel">
                            <i class="bi bi-x-circle-fill me-2"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
