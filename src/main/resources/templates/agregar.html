<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .header-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 20px 20px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .form-label {
            font-weight: 600;
            color: #495057;
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-cancel {
            padding: 12px 30px;
            border-radius: 25px;
            border: 2px solid #6c757d;
            transition: all 0.3s ease;
        }
        .btn-cancel:hover {
            background-color: #6c757d;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header-section">
        <div class="container">
            <h1 class="mb-0"><i class="bi bi-person-plus-fill me-2"></i>Agregar Nuevo Cliente</h1>
            <p class="mb-0 mt-2">Complete el formulario para registrar un nuevo cliente</p>
        </div>
    </div>

    <div class="container">
        <div class="card p-4">
            <div class="card-body">
                <form action="/cliente/agregar" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="documento" class="form-label">
                                <i class="bi bi-card-text me-2"></i>Documento
                            </label>
                            <input type="text" class="form-control" id="documento" name="documento" required placeholder="Ingrese el documento">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="nombre" class="form-label">
                                <i class="bi bi-person-fill me-2"></i>Nombre
                            </label>
                            <input type="text" class="form-control" id="nombre" name="nombre" required placeholder="Ingrese el nombre completo">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="direccion" class="form-label">
                                <i class="bi bi-geo-alt-fill me-2"></i>Dirección
                            </label>
                            <input type="text" class="form-control" id="direccion" name="direccion" required placeholder="Ingrese la dirección">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="correo" class="form-label">
                                <i class="bi bi-envelope-fill me-2"></i>Correo
                            </label>
                            <input type="email" class="form-control" id="correo" name="correo" required placeholder="Ingrese el correo electrónico">
                        </div>
                    </div>
                    <div class="d-flex gap-3 mt-4">
                        <a href="/" class="btn btn-outline-dark">
                            <i class="bi bi-house-fill me-2"></i>Volver al Home
                        </a>
                        <button type="submit" class="btn btn-primary btn-submit">
                            <i class="bi bi-check-circle-fill me-2"></i>Agregar Cliente
                        </button>
                        <a href="/cliente" class="btn btn-outline-secondary btn-cancel">
                            <i class="bi bi-x-circle-fill me-2"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
