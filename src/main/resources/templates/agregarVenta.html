<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realizar Venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .header-section {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 20px 20px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #ff6b6b;
            box-shadow: 0 0 0 0.2rem rgba(255, 107, 107, 0.25);
        }
        .form-label {
            font-weight: 600;
            color: #495057;
        }
        .btn-submit {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }
        .btn-cancel {
            padding: 12px 30px;
            border-radius: 25px;
            border: 2px solid #6c757d;
            transition: all 0.3s ease;
        }
        .btn-cancel:hover {
            background-color: #6c757d;
            color: white;
        }
        .stock-info {
            font-size: 0.875rem;
            color: #6c757d;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="header-section">
        <div class="container">
            <h1 class="mb-0"><i class="bi bi-cart-fill me-2"></i>Realizar Nueva Venta</h1>
            <p class="mb-0 mt-2">Seleccione el producto y la cantidad a vender</p>
        </div>
    </div>

    <div class="container">
        <div class="card p-4">
            <div class="card-body">
                <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
                
                <form action="/venta/agregar" method="post">
                    <div class="mb-3">
                        <label for="cliente" class="form-label">
                            <i class="bi bi-person-fill me-2"></i>Cliente
                        </label>
                        <select class="form-control" id="cliente" name="cliente" required>
                            <option value="">Seleccione un cliente</option>
                            <option th:each="cli : ${clientes}" 
                                    th:value="${cli.id}" 
                                    th:text="${cli.nombre}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="producto" class="form-label">
                            <i class="bi bi-box-seam-fill me-2"></i>Producto
                        </label>
                        <select class="form-control" id="producto" name="producto" required onchange="updateStockInfo()">
                            <option value="">Seleccione un producto</option>
                            <option th:each="prod : ${productos}" 
                                    th:value="${prod.id}" 
                                    th:text="${prod.referencia + ' - $' + prod.precio}"
                                    th:data-stock="${prod.stock}"></option>
                        </select>
                        <div id="stockInfo" class="stock-info"></div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="cantidad" class="form-label">
                            <i class="bi bi-123 me-2"></i>Cantidad
                        </label>
                        <input type="number" class="form-control" id="cantidad" name="cantidad" required min="1" placeholder="Ingrese la cantidad">
                    </div>
                    
                    <div class="d-flex gap-3 mt-4">
                        <a href="/" class="btn btn-outline-dark">
                            <i class="bi bi-house-fill me-2"></i>Volver al Home
                        </a>
                        <button type="submit" class="btn btn-primary btn-submit">
                            <i class="bi bi-check-circle-fill me-2"></i>Realizar Venta
                        </button>
                        <a href="/venta" class="btn btn-outline-secondary btn-cancel">
                            <i class="bi bi-x-circle-fill me-2"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updateStockInfo() {
            const select = document.getElementById('producto');
            const selectedOption = select.options[select.selectedIndex];
            const stockInfo = document.getElementById('stockInfo');
            
            if (selectedOption.value) {
                const stock = selectedOption.getAttribute('data-stock');
                stockInfo.textContent = 'Stock disponible: ' + stock;
            } else {
                stockInfo.textContent = '';
            }
        }
    </script>
</body>
</html>
