<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Categoría</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .header-section {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 20px 20px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #f093fb;
            box-shadow: 0 0 0 0.2rem rgba(240, 147, 251, 0.25);
        }
        .form-label {
            font-weight: 600;
            color: #495057;
        }
        .btn-submit {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(240, 147, 251, 0.4);
        }
        .btn-cancel {
            padding: 12px 30px;
            border-radius: 25px;
            border: 2px solid #6c757d;
            transition: all 0.3s ease;
        }
        .btn-cancel:hover {
            background-color: #6c757d;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header-section">
        <div class="container">
            <h1 class="mb-0"><i class="bi bi-plus-circle-fill me-2"></i>Agregar Nueva Categoría</h1>
            <p class="mb-0 mt-2">Complete el formulario para registrar una nueva categoría</p>
        </div>
    </div>

    <div class="container">
        <div class="card p-4">
            <div class="card-body">
                <form action="/categoria/agregar" method="post">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">
                            <i class="bi bi-tag-fill me-2"></i>Nombre de la Categoría
                        </label>
                        <input type="text" class="form-control" id="nombre" name="nombre" required placeholder="Ingrese el nombre de la categoría">
                    </div>
                    <div class="d-flex gap-3 mt-4">
                        <a href="/" class="btn btn-outline-dark">
                            <i class="bi bi-house-fill me-2"></i>Volver al Home
                        </a>
                        <a href="/producto/agregar" class="btn btn-outline-primary">
                            <i class="bi bi-arrow-left-circle-fill me-2"></i>Volver a Agregar Producto
                        </a>
                        <button type="submit" class="btn btn-primary btn-submit">
                            <i class="bi bi-check-circle-fill me-2"></i>Agregar Categoría
                        </button>
                        <a href="/categoria" class="btn btn-outline-secondary btn-cancel">
                            <i class="bi bi-x-circle-fill me-2"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
