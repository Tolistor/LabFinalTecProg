<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .header-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 20px 20px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .table {
            border-radius: 10px;
            overflow: hidden;
        }
        .table thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            transition: all 0.3s ease;
        }
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-delete {
            border-radius: 20px;
            padding: 5px 15px;
        }
        .form-select-sm {
            border-radius: 8px;
            font-size: 0.875rem;
            padding: 0.25rem 0.5rem;
            border: 1px solid #dee2e6;
            transition: all 0.3s ease;
        }
        .form-select-sm:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
    </style>
</head>
<body>
    <div class="header-section">
        <div class="container">
            <h1 class="mb-0"><i class="bi bi-cart-fill me-2"></i>Gestión de Ventas</h1>
            <p class="mb-0 mt-2">Administre las ventas de sus productos</p>
        </div>
    </div>

    <div class="container">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="mb-0">Lista de Ventas</h3>
                <div class="d-flex gap-2">
                    <a href="/" class="btn btn-outline-secondary">
                        <i class="bi bi-house-fill me-2"></i>Volver al Home
                    </a>
                    <a href="/venta/agregar" class="btn btn-primary btn-add">
                        <i class="bi bi-plus-circle-fill me-2"></i>Realizar Nueva Venta
                    </a>
                </div>
            </div>

            <div class="alert alert-success" th:if="${mensaje}" th:text="${mensaje}"></div>
            <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Precio Unitario</th>
                            <th>Total</th>
                            <th>Estado</th>
                            <th>Fecha</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="venta : ${ventas}">
                            <td th:text="${venta.id}"></td>
                            <td th:text="${venta.cliente != null ? venta.cliente.nombre : 'N/A'}"></td>
                            <td th:text="${venta.producto != null ? venta.producto.referencia : 'N/A'}"></td>
                            <td th:text="${venta.cantidad}"></td>
                            <td th:text="'$' + ${venta.precioUnitario}"></td>
                            <td th:text="'$' + ${venta.total}"></td>
                            <td>
                                <form th:action="@{/venta/update-estado/{id}(id=${venta.id})}" method="post" style="display: inline;">
                                    <select class="form-select form-select-sm" name="estado" onchange="this.form.submit()" style="width: 120px;">
                                        <option value="Pendiente" th:selected="${venta.estado == 'Pendiente'}">Pendiente</option>
                                        <option value="Pagado" th:selected="${venta.estado == 'Pagado'}">Pagado</option>
                                        <option value="Entregado" th:selected="${venta.estado == 'Entregado'}">Entregado</option>
                                    </select>
                                </form>
                            </td>
                            <td th:text="${#temporals.format(venta.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <a th:href="@{/venta/delete/{id}(id=${venta.id})}" class="btn btn-danger btn-sm btn-delete">
                                    <i class="bi bi-trash-fill"></i> Eliminar
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(ventas)}">
                            <td colspan="9" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                No hay ventas registradas
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
